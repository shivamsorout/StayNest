spring.application.name=staynest-backend

server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/staynest_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# spring.datasource.url=jdbc:mysql://localhost:3306/staynest_db
# spring.datasource.username=root
# spring.datasource.password=Admin@12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.output.ansi.enabled=ALWAYS

jwt.secret=${JWT_SECRET:StayNest@2026#JWT$SecretKey%Secure!X91KLMpQ72}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.debug=true
